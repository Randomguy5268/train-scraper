name: Shinkansen Scraper

on:
  schedule:
    # Runs every 5 minutes during Japanese operating hours
    - cron: '*/5 21-23,0-14 * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pytz beautifulsoup4

      - name: Install Playwright Chromium
        run: playwright install chromium

      - name: Run Timetable Ripper
        run: python timetable_ripper.py

      - name: Run Scraper
        run: python scraper_job.py

      - name: Commit and Push Data
        run: |
          git config --global user.name "TrainBot"
          git config --global user.email "bot@github.com"
          # Add both files
          git add live_trains.json timetable.json
          # Commit the changes
          git commit -m "Update live and timetable data" || exit 0
          # Pull the latest changes from the server to avoid the conflict
          git pull --rebase origin main
          # Now push
          git push
